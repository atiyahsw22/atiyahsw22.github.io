<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - atiyah saleemah</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #ff4d00;
            color: #0de616;
            padding: 40px 20px;
            min-height: 100vh;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='%230de616'><path d='M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z'/></svg>") 12 12, auto;
        }

        .window {
            max-width: 860px;
            margin: 0 auto;
            background: #c0c0c0;
            border: 4px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            box-shadow: 6px 6px 0 #000;
            overflow: hidden;
        }

        .title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 4px 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-controls {
            display: flex;
            gap: 4px;
        }

        .win-btn {
            width: 22px; height: 22px;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
        }

        .menu-bar {
            background: #c0c0c0;
            padding: 4px 10px;
            border-bottom: 2px solid #fff;
            font-size: 0.95rem;
        }

        .content {
            background: white;
            padding: 40px;
            color: #000;
            line-height: 1.7;
            min-height: 500px;
        }

        .content h1 {
            font-size: 2.4rem;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #000;
            padding-bottom: 12px;
        }

        .bottom-bar {
            background: #c0c0c0;
            padding: 12px;
            text-align: center;
            border-top: 2px solid #fff;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div id="pageTitle">loading... ★ atiyah saleemah</div>
        <div class="window-controls">
            <div class="win-btn" onclick=>_</div>
            <div class="win-btn" onclick=>□</div>
            <div class="win-btn" onclick="window.close()" style="font-size:18px;">×</div>
        </div>
    </div>

    <div class="menu-bar">
        File &nbsp;&nbsp; Edit &nbsp;&nbsp; View &nbsp;&nbsp; Help
    </div>

    <div class="content" id="content">
        <!-- Your article will appear here -->
    </div>

    <div class="bottom-bar">
        <button onclick="window.history.back()">← back</button>
    </div>
</div>

<script>
// This will load Markdown files later
</script>

</body>
</html>
