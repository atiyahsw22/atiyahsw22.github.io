<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview - atiyah saleemah</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #ff4d00;
            color: #0de616;
            padding: 20px;
            min-height: 100vh;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='%230de616'><path d='M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z'/></svg>") 12 12, auto;
        }

        h1 { color: white; text-align: center; margin-bottom: 30px; }

        /* Retro Window */
        .window {
            max-width: 820px;
            margin: 20px auto;
            background: #c0c0c0;
            border: 4px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            box-shadow: 6px 6px 0 #000;
            overflow: hidden;
        }

        .title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 4px 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-controls {
            display: flex;
            gap: 4px;
        }

        .win-btn {
            width: 22px; height: 22px;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
        }

        .content {
            background: white;
            padding: 40px;
            color: #000;
            line-height: 1.7;
            min-height: 400px;
        }

        .content h1 { color: #000; border-bottom: 3px solid black; padding-bottom: 10px; }
    </style>
</head>
<body>

<h1>★ YOUR FUTURE SITE PREVIEW ★</h1>

<!-- Homepage Simulation -->
<div style="max-width: 900px; margin: 0 auto 60px;">
    <h2 style="color:white; text-align:center; margin:20px;">Homepage (index.html)</h2>
    <div style="background:#c0c0c0; padding:20px; border:4px solid #fff; text-align:center;">
        <p><strong>Search bar works here</strong></p>
        <p>Click any card below to open article in retro window →</p>
        
        <div style="display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin-top:30px;">
            <div onclick="showArticle(0)" style="background:#0de616; color:black; padding:15px; width:220px; cursor:pointer;">
                <strong>Welcome to the New Site</strong><br>
                <small>Full creative control...</small>
            </div>
            <div onclick="showArticle(1)" style="background:#0de616; color:black; padding:15px; width:220px; cursor:pointer;">
                <strong>2dafuture: 6 Predictions</strong><br>
                <small>My bold observations...</small>
            </div>
        </div>
    </div>
</div>

<!-- Article Window (this is what readers will see) -->
<div id="articleWindow" class="window" style="display:none;">
    <div class="title-bar">
        <div id="articleTitle">Article Title ★ atiyah saleemah</div>
        <div class="window-controls">
            <div class="win-btn" onclick="alert('Minimized ✨')">_</div>
            <div class="win-btn" onclick="alert('Maximized ✨')">□</div>
            <div class="win-btn" onclick="closeArticle()" style="font-size:18px;">×</div>
        </div>
    </div>

    <div class="content" id="articleContent">
        <!-- Content loaded by JS -->
    </div>
</div>

<script>
    const articles = [
        {
            title: "Welcome to the New Site",
            content: `
                <h1>Welcome to the New Site</h1>
                <p>Hey y'all, I finally got full creative control.</p>
                <p>This is running on simple <strong>Markdown</strong> now — super easy for me to write more posts.</p>
                <p>I can add lists:</p>
                <ul>
                    <li>Retro AOL windows</li>
                    <li>Easy search</li>
                    <li>Keep writing for years</li>
                </ul>
            `
        },
        {
            title: "2dafuture: 6 Predictions",
            content: `
                <h1>2dafuture: 6 Predictions</h1>
                <p>The next decade is going to be wild.</p>
                <p>More thoughts coming soon...</p>
            `
        }
    ];

    function showArticle(index) {
        const art = articles[index];
        document.getElementById('articleTitle').textContent = art.title + " ★ atiyah saleemah";
        document.getElementById('articleContent').innerHTML = art.content;
        document.getElementById('articleWindow').style.display = 'block';
    }

    function closeArticle() {
        document.getElementById('articleWindow').style.display = 'none';
    }
</script>

</body>
</html>
